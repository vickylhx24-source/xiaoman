    <ellipse cx="220" cy="193" rx="27" ry="50" transform="rotate(40 220 193)"/>
    <ellipse cx="292" cy="193" rx="27" ry="50" transform="rotate(-40 292 193)"/>
    <ellipse cx="231" cy="152" rx="23" ry="44" transform="rotate(38 231 152)"/>
